name: MindKeeper
options:
  bundleIdPrefix: com.mindkeeper
  deploymentTarget:
    macOS: "26.0"
  xcodeVersion: "17.0"
  minimumXcodeGenVersion: "2.40.0"

packages:
  Ollama:
    url: https://github.com/mattt/ollama-swift.git
    from: "1.8.0"

settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "26.0"
    ENABLE_USER_SCRIPT_SANDBOXING: false

targets:
  MindKeeper:
    type: application
    platform: macOS
    sources:
      - path: MindKeeper
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mindkeeper.app
        INFOPLIST_FILE: MindKeeper/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: MindKeeper/Resources/MindKeeper.entitlements
        PRODUCT_NAME: Mind Keeper
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        COMBINE_HIDPI_IMAGES: true
    dependencies:
      - package: Ollama
    info:
      path: MindKeeper/Resources/Info.plist
      properties:
        LSUIElement: true
        CFBundleDisplayName: Mind Keeper
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "1"
        LSMinimumSystemVersion: "26.0"
